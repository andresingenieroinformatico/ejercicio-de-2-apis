<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de APIs - Desarrollo Web II</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50 min-h-screen font-sans">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
<aside class="lg:col-span-4 space-y-6">
    <div class="card-gradiente p-8 shadow-2xl shadow-slate-200/50 border border-white/60 rounded-[2.5rem] relative overflow-hidden group">
        
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-cyan-100/30 rounded-full blur-3xl group-hover:bg-cyan-200/40 transition-colors duration-500"></div>
        
        <h2 class="text-[10px] font-black text-cyan-600 uppercase tracking-[0.2em] mb-6 flex items-center gap-2">
            <span class="w-1.5 h-1.5 bg-cyan-500 rounded-full animate-pulse"></span>
            Módulo de Clima
        </h2>
        
        <div class="flex gap-2 mb-8 bg-white/50 backdrop-blur-sm p-2 rounded-2xl border border-slate-100 shadow-inner focus-within:ring-2 focus-within:ring-cyan-400/20 focus-within:border-cyan-300 transition-all duration-300">
            <input type="text" id="inputCiudad" placeholder="Buscar ciudad..." class="w-full bg-transparent px-4 py-2 outline-none text-slate-700 font-medium placeholder:text-slate-400 placeholder:italic">
            
            <button id="btnBuscar" 
                    class="bg-cyan-500 hover:bg-cyan-600 text-white p-3 rounded-xl transition-all shadow-lg shadow-cyan-200 active:scale-95 flex items-center justify-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </button>
        </div>

        <div id="infoClima" class="text-center min-h-[220px] flex flex-col justify-center items-center rounded-3xl bg-slate-50/50 border border-dashed border-slate-200">
            <div class="opacity-40 flex flex-col items-center group-hover:scale-110 transition-transform duration-500">
                <div class="p-4 bg-white rounded-full shadow-sm mb-3">
                    <span class="text-3xl">📍</span>
                </div>
                <p class="text-slate-500 font-medium text-xs leading-relaxed max-w-[150px]">
                    Esperando coordenadas...
                </p>
            </div>
        </div>
    </div>
</aside>

            <main class="lg:col-span-8 space-y-6">
                <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-200">
                    <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                        <div>
                            <h2 class="text-2xl font-bold text-slate-800">Explorador de Contenido</h2>
                            <p class="text-slate-400 text-sm italic">Filtra por ID de usuario</p>
                        </div>
                        
                        <div class="flex bg-slate-50 p-1.5 rounded-2xl border border-slate-200 min-w-[280px]">
                            <input type="number" id="userId" placeholder="ID (1-10)..." 
                                class="flex-1 bg-transparent px-4 outline-none text-slate-600">
                            <button id="btnCargar" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-xl font-bold text-sm transition shadow-sm">
                                Cargar
                            </button>
                        </div>
                    </div>

                    <div id="posts" class="grid grid-cols-1 md:grid-cols-2 gap-6 max-h-[700px] overflow-y-auto pr-2 custom-scrollbar">
                        <div class="col-span-full text-center py-20">
                            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-slate-200 border-t-indigo-600 mb-4"></div>
                            <p class="text-slate-400 font-medium">Sincronizando con la API externa...</p>
                        </div>
                    </div>
                </div>
            </main>

        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
